name: Continuous Integration

on:
  pull_request:
    branches: [main]

jobs:
  tests-and-linter:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar entorno de Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Compilar y ejecutar pruebas
        run: mvn verify --no-transfer-progress
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: ""
          FLOWISE_CHATFLOW_ID: test-id
          FLOWISE_API_KEY: test-key
          JWT_SECRET: test-secret-key-minimo-32-caracteres-ok