spring:
  application:
    name: appbit

  datasource:
    url: ${DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      url: ${REDIS_URL}

server:
  port: ${PORT:8080}

flowise:
  url: ${FLOWISE_URL:https://cloud.flowiseai.com}
  chatflow-id: ${FLOWISE_CHATFLOW_ID}
  api-key: ${FLOWISE_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    com.appbit.matching: INFO