spring:
  application:
    name: appbit
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

flowise:
  url: https://cloud.flowiseai.com
  chatflow-id: ${FLOWISE_CHATFLOW_ID:}
  api-key: ${FLOWISE_API_KEY:}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    com.appbit.matching: INFO